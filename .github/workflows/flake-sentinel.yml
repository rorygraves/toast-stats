# Flake Sentinel (#916, epic #917 S5) — standing stress sentinel.
#
# The flakiness epic eradicated the load/contention root causes (S3) and the
# CDN/Lighthouse timing flakes (S4), and proved a 0% rate on a clean runner.
# This sentinel is the LOCK-IN: it runs the §2.3 suspect set a
# statistically-significant number of times under the original amplifier
# (CI=true, --coverage, --maxWorkers=100% — see scripts/lib/flakeMetrics.ts)
# and GATES on FLAKE_MAX_RATE=0, so any single flake over the run count fails
# the job and a regression is caught within a day.
#
# Why a SEPARATE, SCHEDULED job (not the per-PR ci.yml flake-detection step):
# the detector pins 100% workers and is sensitive BY DESIGN (L136). Gating that
# on every PR would re-introduce the flaky CI this epic just removed — a
# contention blip on a shared PR runner would red an unrelated PR. So the per-PR
# job stays NON-gating/informational, and the gate lives here, on a dedicated
# nightly runner where a red genuinely means "the suspect set flaked on a clean
# box" = a real regression. Gate-vs-detector decoupling, same spirit as the V8
# cap (gate stable) vs the 100%-worker detector (sensitive).
#
# Gating decision logic is unit-tested (scripts/lib/__tests__/flakeMetrics.test.ts
# — resolveMaxRate / evaluateFlakeGate); this workflow is the scheduler + alerter.

name: Flake Sentinel

on:
  schedule:
    # Nightly at 05:30 UTC — a quiet window, independent of the data pipeline.
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      repeats:
        description: 'Number of suspect-set runs (default 30)'
        required: false
        type: string
      max_rate:
        description: 'Gate ceiling as a fraction 0..1 (default 0 = any flake fails)'
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: flake-sentinel
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  stress:
    name: Suspect-set stress run (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dependency packages
        run: |
          npm run build:shared-contracts
          npm run build:analytics-core

      - name: Run flake sentinel (gating)
        id: flake
        continue-on-error: true
        env:
          # Statistically-significant count proving ~0 over many trials (L78);
          # gate on 0 so a single flake over the run count fails the job.
          FLAKE_REPEATS: ${{ inputs.repeats || '30' }}
          FLAKE_MAX_RATE: ${{ inputs.max_rate || '0' }}
        run: npm run test:flake

      - name: Upload flake metric artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake-sentinel-metric
          path: flake-metric.json
          if-no-files-found: warn

      - name: Ensure flake-regression label exists
        if: steps.flake.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create flake-regression \
            --color B60205 \
            --description "Nightly flake sentinel measured a non-zero flake rate" \
            2>/dev/null || echo "Label already exists"

      - name: Open or update flake-regression alert
        if: steps.flake.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY_FILE="${RUNNER_TEMP}/flake-alert.md"
          {
            echo "The nightly flake sentinel measured a **non-zero flake rate**"
            echo "over the suspect set on a clean runner (\`FLAKE_MAX_RATE=0\`)."
            echo "This is a contention/isolation regression — the eradicated"
            echo "flake class has re-opened."
            echo
            echo "- Run: ${RUN_URL}"
            echo "- Metric artifact: \`flake-sentinel-metric\` (flake-metric.json)"
            echo "  on that run — check \`flakeRate\` and the p50/p95 duration"
            echo "  spread (variance is the contention signal, L53)."
            echo
            echo "Triage per the deep-dive (docs/investigations/"
            echo "test-flakiness-deep-dive-2026-05-28.md §3): which vector"
            echo "re-opened — V8 worker cap, V2 await-waitFor leak, V1 provider"
            echo "bloat / page mount? Do NOT bump timeouts (masks contention) —"
            echo "root-cause it. Quarantine via frontend/test-quarantine.json"
            echo "only while the fix is in flight (R1)."
          } > "${BODY_FILE}"
          # Dedup: one open alert at a time — comment rather than spam.
          EXISTING=$(gh issue list --label flake-regression --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "${EXISTING}" ]; then
            echo "Existing open alert #${EXISTING} — adding a comment."
            gh issue comment "${EXISTING}" --body-file "${BODY_FILE}"
          else
            echo "No open alert — creating one."
            gh issue create \
              --title "Flake sentinel: non-zero flake rate on the suspect set" \
              --label flake-regression \
              --body-file "${BODY_FILE}"
          fi

      - name: Fail the run when the sentinel tripped
        if: steps.flake.outcome == 'failure'
        run: |
          echo "::error::Flake sentinel measured a non-zero flake rate — a flake-regression issue has been filed."
          exit 1
