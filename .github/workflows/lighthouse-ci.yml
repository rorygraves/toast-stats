name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'lighthouserc.js'

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace dependencies
        run: |
          npm run build:shared-contracts
          npm run build:analytics-core

      - name: Build frontend
        # #915 (Sprint 4 V10): point the build at the local fixture server
        # (scripts/lighthouse-cdn-server.mjs, started by lighthouserc.js) so the
        # `/` page fetches committed CDN fixtures same-origin instead of the live
        # prod CDN. Decouples the CLS budget from network reachability — the gate
        # stops failing on luck when the CDN flakes (Lesson 125, deep-dive V10).
        run: npm run build:frontend
        env:
          VITE_CDN_BASE_URL: http://localhost:4173

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.js'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = '.lighthouseci';

            if (!fs.existsSync(resultsDir)) {
              console.log('No Lighthouse results found');
              return;
            }

            const manifests = fs.readdirSync(resultsDir)
              .filter(f => f.endsWith('.json') && f.startsWith('manifest'));

            if (manifests.length === 0) return;

            const manifest = JSON.parse(
              fs.readFileSync(path.join(resultsDir, manifests[0]), 'utf8')
            );

            let comment = '## 🏠 Lighthouse CI Results\n\n';
            comment += '| Metric | Score |\n|--------|-------|\n';

            for (const entry of manifest) {
              if (entry.summary) {
                const perf = Math.round((entry.summary.performance || 0) * 100);
                const a11y = Math.round((entry.summary.accessibility || 0) * 100);
                const bp = Math.round((entry.summary['best-practices'] || 0) * 100);
                comment += `| Performance | ${perf} |\n`;
                comment += `| Accessibility | ${a11y} |\n`;
                comment += `| Best Practices | ${bp} |\n`;
                break;
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });
