<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toast Stats — Toastmasters District Performance</title>
    <meta
      name="description"
      content="Explore Toastmasters district performance: club health, DCP goals, membership trends, and Distinguished status — visualized across program years."
    />
    <link rel="canonical" href="https://ts.taverns.red/" />

    <!-- Share/SEO metadata (#778). All values are STATIC — no user input —
         and the og:image is a static asset shipped from public/ (F-SEC4),
         so there is no injection vector. Absolute https URLs on the
         canonical host are required for Open Graph / Twitter cards. -->
    <meta property="og:title" content="Toast Stats — Toastmasters District Performance" />
    <meta
      property="og:description"
      content="Explore Toastmasters district performance: club health, DCP goals, membership trends, and Distinguished status — visualized across program years."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ts.taverns.red/" />
    <meta property="og:image" content="https://ts.taverns.red/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Toast Stats" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Toast Stats — Toastmasters District Performance" />
    <meta
      name="twitter:description"
      content="Explore Toastmasters district performance: club health, DCP goals, membership trends, and Distinguished status — visualized across program years."
    />
    <meta name="twitter:image" content="https://ts.taverns.red/og-image.png" />

    <!-- Google Fonts Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload Critical Font Files. Montserrat + Source Sans 3 are served
         as single variable WOFF2 files, so adding the redesign weights
         (Montserrat 600/800, Source Sans 500) is free — no extra bytes.
         JetBrains Mono is intentionally NOT preloaded yet; the --mono
         token in tokens/redesign.css falls back to ui-monospace until
         a consumer ships in #354 (AppShell). -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

    <!-- Red Taverns Brand v1.0 fonts (#339 Phase 1). Loaded alongside the
         existing Montserrat / Source Sans 3 because Phase 2 chrome
         migration is blocked on ops#37 (the rename decision). Once the
         rename ships, the legacy pair drops in the same PR that
         re-skins components with --rt-* tokens.

         JetBrains Mono preload intentionally OMITTED in Phase 1: the
         redesign --mono token (`'JetBrains Mono', ui-monospace, ...`)
         has 8 live consumers in app-shell.css. Preloading swaps the
         text from ui-monospace to JetBrains Mono ~300ms in and pushes
         CLS from 0.012 → 0.199 (Lighthouse failed PR #595 first push;
         the lighthouserc threshold is 0.1). The brand spec requires
         the font to be REACHABLE (it is, via the token file's
         declaration), not necessarily PRELOADED. Re-enable in the
         Phase 2 PR once consumers migrate to --rt-font-mono with
         metric-matched fallbacks (or self-hosted with size-adjust). -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

    <!-- Fallback for JavaScript Disabled -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    </noscript>
    
    <!-- Font Loading Optimization Script -->
    <script>
      // Optimize font loading with font-display: swap fallback
      if ('fonts' in document) {
        document.fonts.ready.then(() => {
          document.documentElement.classList.add('fonts-loaded');
        });
      }
    </script>

    <!-- Google Analytics 4 (#314) — production only, no PII collected -->
    <script>
      // Only load GA on production hostname (not localhost / preview)
      if (window.location.hostname === 'ts.taverns.red') {
        var gaScript = document.createElement('script');
        gaScript.async = true;
        gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-CDWQYHC2Z3';
        document.head.appendChild(gaScript);
        window.dataLayer = window.dataLayer || [];
        function gtag() { window.dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-CDWQYHC2Z3', {
          anonymize_ip: true,
          allow_google_signals: false,
          allow_ad_personalization_signals: false
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
